<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head>

    <title>Default layout</title>

</head>
<body>

<!-- Фрагмент с параметрами -->
<div th:fragment="layout(title, section)">
    <head>
        <meta charset="UTF-8">
        <title th:replace="${title}">Default Title</title>
        <style>
            /* Стили для таблицы */
            table {
                width: 50%;
                border-collapse: collapse; /* Убирает двойные границы */
                margin: 20px 0;
                font-family: Arial, sans-serif;
            }

            th, td {
                border: 1px solid #ddd;
                padding: 12px;
                text-align: left;
            }

            th {
                background-color: #f2f2f2; /* Цвет фона для заголовков */
                font-weight: bold;
            }

            tr:nth-child(even) {
                background-color: #f9f9f9; /* Чередующийся цвет строк */
            }

            tr:hover {
                background-color: #f1f1f1; /* Цвет строки при наведении */
            }

            /* Стили для сообщений */
            .success-message {
                color: green;
                margin-bottom: 10px;
            }

            .error-message {
                color: red;
                margin-bottom: 10px;
            }
        </style>
    </head>
    <body>

    <div th:replace="fragments/login-button :: login-button"></div>
    <div th:replace="${section}">Default Content</div>
    <div th:replace="fragments/logout-button :: logout-button"></div>

    </body>
</div>


</body>
</html>
