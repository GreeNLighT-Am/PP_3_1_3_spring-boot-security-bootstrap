<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/default :: layout(~{::title}, ~{::section})}">

<head>
    <title>Title from Update user page</title>
</head>
<body>

<section th:fragment="section">

    <!-- Контент страницы -->

    <form th:method="POST" th:action="@{/admin/update}" th:object="${user}">
        <input type="hidden" th:field="*{id}"/>
        <label for="name">Введите имя: </label>
        <input type="text" th:field="*{name}" id="name"/>
        <div style="color: red" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">Error for name</div>
        <br/>
        <label for="age">Введите возраст: </label>
        <input type="text" th:field="*{age}" id="age"/>
        <div style="color: red" th:if="${#fields.hasErrors('age')}" th:errors="*{age}">Error for age</div>
        <br/>
        <label for="email">Введите email: </label>
        <input type="text" th:field="*{email}" id="email"/>
        <div style="color: red" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">Error for email</div>
        <br/>
        <label for="password">Введите пароль: </label>
        <input type="text" th:field="*{password}" id="password"/>
        <div style="color: red" th:if="${#fields.hasErrors('password')}" th:errors="*{password}">Error for password
        </div>
        <br/>

        <!-- Поле выбора ролей -->
        <label>Выберите роли:</label>
        <div th:each="role : ${allRoles}">
            <input type="checkbox"
                   th:field="*{roles}"
                   th:value="${role.id}"
                   th:id="${'role_' + role.id}"
                   th:checked="${user.roles?.contains(role)}"/>
            <label th:for="${'role_' + role.id}" th:text="${role.role}"></label>
        </div>

        <input type="submit" value="Редактировать"/>
    </form>

    <br/>
    <form th:method="GET" th:action="@{/admin/user(id=${user.id})}" th:object="${user}">
        <input type="hidden" th:field="*{id}"/>
        <input type="submit" value="Отмена"/>
    </form>

    <hr/>

</section>

</body>
</html>
