<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/default :: layout(~{::title}, ~{::section})}">
<head>
    <title>Title from Users page</title>
</head>
<body>

<section th:fragment="section">

    <!-- Контент страницы -->

    <!-- Вывод сообщения об успешной операции, если оно есть -->
    <div th:if="${successMessage}" class="success-message">
        <p th:text="${successMessage}"></p>
    </div>

    <!-- Вывод сообщения об ошибке, если оно есть -->
    <div th:if="${errorMessage}" class="error-message">
        <p th:text="${errorMessage}"></p>

        <p>Но вы можете добавить нового пользователя</p>

        <form th:method="GET" th:action="@{/admin/new}">
            <input type="submit" value="Добавить нового пользователя"/>
        </form>

        <p>или вернуться</p>

        <a th:href="@{/admin}"><< Вернуться к списку пользователей</a>
    </div>

    <!-- Таблица отображается только если нет ошибки -->
    <div th:if="${errorMessage == null}">

        <h1 th:text="${#request.userPrincipal.name} + ', добро пожаловать на страницу администрирования!'">Welcome message</h1>

        <div style="text-align: left; margin: 20px 0;">
            <form th:action="@{/user}" method="get" style="display: inline;">
                <button type="submit"
                        style="background: gray; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer;">
                    Персональная страница
                </button>
            </form>
        </div>

        <hr/>

        <br/>

        <form th:method="GET" th:action="@{/admin/new}">
            <input type="submit" value="Добавить нового пользователя"/>
        </form>
        <h1>Список пользователей:</h1>
        <table>
            <thead>
            <tr>
                <th>id</th>
                <th>Имя</th>
                <th>Возраст</th>
                <th>Email</th>
                <th>Роли</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="user : ${users}" style="cursor: pointer;"
                th:onclick="|window.location.href='@{/admin/user(id=${user.id})}'|">
                <td th:text="${user.id}"></td>
                <td th:text="${user.name}"></td>
                <td th:text="${user.age}"></td>
                <td th:text="${user.email}"></td>
                <td>
    <span th:each="role, iter : ${user.roles}"
          th:text="${iter.index > 0 ? ', ' : ''} + ${#strings.replace(role.role, 'ROLE_', '')}">
    </span>
                </td>
            </tr>
            </tbody>
        </table>

        <a th:href="@{/}" style="display: block; text-align: center; width: 100%;">На главную страницу</a>

        <hr/>

    </div>

</section>

</body>
</html>
