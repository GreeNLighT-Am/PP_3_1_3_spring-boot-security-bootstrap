<!doctype html>
<html lang="en">
<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

    <title>User information-page</title>

</head>
<body>


<!--Навбар-->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark" style="height: 45px;">

    <div class="d-flex align-items-center justify-content-start w-100 ps-3">
        <span class="text-white me-1 fs-5 fw-bold">user@mail.ru</span>
        <span class="text-white me-1 fs-5">with roles:</span>
        <span class="text-white fs-5">USER</span>
    </div>

    <div class="navbar-nav d-flex pe-2">
        <a class="nav-link" href="#">Logout</a>
    </div>

</nav>

<!--Основной контейнер-->
<!--
 - vh-100 на container-fluid — задаёт высоту контейнера 100% от высоты экрана.
 - h-100 на row — передаёт 100% высоты ряду (внутри контейнера).
 - d-flex flex-column на колонках (col-2 и col-10) — превращает колонки в гибкие контейнеры с вертикальным расположением дочерних элементов.
 - flex-grow-1 на блоке с контентом — заставляет этот блок растянуться и занять всё оставшееся пространство внутри колонки.
 - mb-auto на меню (nav) в левой колонке — прижимает меню к верху, а нижний блок (если есть) — к низу.
-->
<div class="container-fluid vh-100">
    <div class="row vh-100">

        <div class="col-2 d-flex flex-column p-0 mb-auto"><!-- Левая колонка (меню) -->
            <div class="flex-grow-1 d-flex flex-column ">
                <a class="nav-link bg-primary text-white flex-fill text-start rounded mt-3">User</a>
            </div>
            <!-- Здесь можно добавить нижний блок (например, футер для меню) -->
        </div>


        <div class="col-10 bg-light d-flex flex-column px-4"> <!-- Правая колонка (контент) -->
            <!-- Тут ваш текущий контент (табы, таблица и т. д.) -->
            <h1 class="mb-3 mt-3">User information-page</h1>

            <!--Карточка All users-->
            <div class="card">
                <h5 class="card-header d-flex align-items-center">About user</h5>
                <div class="card-body">

                    <!--Содержимое карточки All users-->

                    <table class="table table-striped border-top">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>First name</th>
                            <th>Last name</th>
                            <th>Age</th>
                            <th>Email</th>
                            <th>Role</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr>
                            <td>1</td>
                            <td>First name</td>
                            <td>Last name</td>
                            <td>@Age</td>
                            <td>Email</td>
                            <td>Role</td>
                        </tr>
                        <tr>
                            <td>2</td>
                            <td>Jacob</td>
                            <td>Thornton</td>
                            <td>@fat</td>
                        </tr>
                        <tr>
                            <td>3</td>
                            <td>Larry the Bird</td>
                            <td>Bird</td>
                            <td>@twitter</td>
                        </tr>
                        </tbody>
                    </table>

                </div>
            </div>
        </div>
    </div>
</div>


<!-- Optional JavaScript; choose one of the two! -->

<!-- Option 1: Bootstrap Bundle with Popper -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>

<!-- Option 2: Separate Popper and Bootstrap JS -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js" integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous"></script>
-->
</body>
</html>
