<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/default :: layout(~{::title}, ~{::section})}">

<head>
    <title>Title from index page</title>
</head>
<body>

<section th:fragment="section">

    <!-- Контент страницы -->
    <h1 th:if="${#request.userPrincipal != null}" th:text="${#request.userPrincipal.name} + ', добро пожаловать на главную страницу!'">
        Welcome message</h1>

    <div th:if="${#request.userPrincipal != null and #request.isUserInRole('ADMIN')}"
         style="text-align: left; margin: 20px 0;">
        <form th:action="@{/admin}" method="get" style="display: inline;">
            <button type="submit"
                    style="background: green; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer;">
                Админ-панель
            </button>
        </form>
    </div>

    <div th:if="${#request.userPrincipal != null and #request.isUserInRole('USER')}"
         style="text-align: left; margin: 20px 0;">
        <form th:action="@{/user}" method="get" style="display: inline;">
            <button type="submit"
                    style="background: gray; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer;">
                Персональная страница
            </button>
        </form>
    </div>

    <h1 th:if="${#request.userPrincipal == null}">Добро пожаловать на главную страницу!</h1>

</section>

</body>
</html>
